# Generic Edge NPU — FICTIONAL hardware profile.
#
# This profile is illustrative only. It does not represent, emulate, or
# approximate any real accelerator, including any Quadric product. All cost
# model outputs derived from it are ESTIMATED values.

name: generic_edge_npu
description: Fictional edge NPU profile for analytical cost modeling.
provenance: estimated

precisions:
  int8:
    supported: true
    relative_compute_throughput: 1.0   # baseline
    bytes_per_element: 1
  int4:
    supported: true
    relative_compute_throughput: 1.8   # fictional speedup vs int8
    bytes_per_element: 0.5
  fp32:
    supported: true                    # fallback path, heavily penalized
    relative_compute_throughput: 0.1
    bytes_per_element: 4

memory:
  dram_bandwidth_gb_per_s: 8.0         # fictional
  on_chip_buffer_kib: 512              # fictional

layer_support:
  conv2d: [int4, int8, fp32]
  linear: [int4, int8, fp32]
  depthwise_conv2d: [int8, fp32]       # fictional: no int4 depthwise
  batchnorm: [fp32]
  activation: [int8, fp32]
