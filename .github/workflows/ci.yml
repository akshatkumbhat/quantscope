name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          # The validated environment (ADR-011): the graph-anchored parity
          # simulator is version-pinned to torch 2.2.x by a runtime guard,
          # so CI tests the environment the project actually validated.
          # CPU wheels keep the install small; this matches the recorded
          # run artifacts (environment.json: torch 2.2.2 / tv 0.17.2).
          python -m pip install --index-url https://download.pytorch.org/whl/cpu \
            "torch==2.2.2" "torchvision==0.17.2"
          python -m pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Tests
        run: python -m pytest -m "not slow"
      - name: CLI smoke test
        run: |
          quantscope --help
          quantscope version-info
